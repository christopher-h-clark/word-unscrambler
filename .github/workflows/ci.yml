name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'refactor/**', 'test/**', 'docs/**', 'chore/**']
  pull_request:
    branches: [main]

# Environment variable overrides (optional):
#   BUNDLE_LIMIT_KB: Max bundle size in KB (default: 100)
#   PLAYWRIGHT_TIMEOUT: E2E test timeout in ms (default: 45000)
#   PLAYWRIGHT_BASE_URL: E2E test base URL (default: http://localhost:5173)

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - run: npm run type-check

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - run: npm run lint
      - run: npm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - run: npm run build
      - name: Check bundle size
        run: node scripts/check-bundle-size.js

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - run: npm run test:run
      - run: npm run test:coverage
      - name: Check coverage threshold
        run: node scripts/check-coverage.js
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: packages/*/coverage
          retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - run: npm audit --audit-level=moderate

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_retry: 3
      - name: Install Playwright (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "Playwright install attempt $attempt/3..."
            timeout 240 npx playwright install --with-deps && break
            if [ $attempt -lt 3 ]; then echo "Retrying..."; sleep 5; fi
          done
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

  merge-check:
    name: All Checks Passed
    needs: [type-check, lint, build, test, security, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "All required checks passed!"
