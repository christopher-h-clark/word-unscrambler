openapi: '3.1.0'
info:
  title: Word Unscrambler API
  description: Find all valid English words that can be formed from a given set of letters.
  version: '1.0.0'
  contact:
    name: Word Unscrambler Team

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://word-unscrambler.example.com
    description: Production server

tags:
  - name: Words
    description: Word unscrambling operations

paths:
  /unscrambler/v1/words:
    get:
      tags:
        - Words
      summary: Find words that can be formed from letters
      description: >
        Returns all valid English words (3–7 letters) that can be formed from
        the provided letters. Supports wildcard (?) matching any single letter.
        Input is treated case-insensitively. Results are sorted alphabetically
        and contain no duplicates.
      operationId: getWords
      parameters:
        - name: letters
          in: query
          required: true
          description: >
            Letters to search (3–10 characters). Allowed characters: a–z, A–Z,
            and ? (wildcard matching any single letter). Input is trimmed of
            leading/trailing whitespace and normalized to lowercase before lookup.
          schema:
            type: string
            minLength: 3
            maxLength: 10
            pattern: '^[a-zA-Z?]+$'
          examples:
            valid:
              summary: Standard 3-letter input
              value: 'abc'
            wildcard:
              summary: Input with wildcard character
              value: 'h?llo'
            uppercase:
              summary: Uppercase input (treated as lowercase)
              value: 'ABC'
      responses:
        '200':
          description: Success — returns array of matching words (may be empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordsResponse'
              examples:
                withResults:
                  summary: Words found
                  value:
                    words: ['abc', 'bac', 'cab']
                noResults:
                  summary: No words match the input (still 200, not an error)
                  value:
                    words: []
        '400':
          description: Bad Request — invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingParam:
                  summary: Missing letters parameter
                  value:
                    error: 'Supplied text parameter is required.'
                lengthError:
                  summary: Input is outside the 3–10 character range
                  value:
                    error: 'Supplied text must be 3\u201310 characters in length.'
                invalidChars:
                  summary: Input contains invalid characters (digits, special chars, etc.)
                  value:
                    error: 'Supplied text may only include letters (upper or lower case) and question marks.'
        '500':
          description: Internal Server Error — unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Unexpected server error (e.g. dictionary corruption)
                  value:
                    error: 'Server error. Please try again later.'

components:
  schemas:
    WordsResponse:
      type: object
      required:
        - words
      properties:
        words:
          type: array
          uniqueItems: true
          description: >
            Alphabetically sorted array of valid English words that can be
            formed from the input letters. Always present; empty when no words
            match.
          items:
            type: string
            minLength: 3
            maxLength: 7

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Sanitized error message describing what went wrong.
