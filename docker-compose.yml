services:
  word-unscrambler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: word-unscrambler
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      WORD_LIST_PATH: ./packages/server/data/words.txt
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'sh', '-c', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
